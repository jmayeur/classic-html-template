<html lang="en">

<body>
  <div class="retro-center">

    <h1>Table Example</h1>
    <hr>
    <article>
      <section>
        <h2>Sample Table</h2>
        <table border="1" cellpadding="4" cellspacing="0">
          <thead>
            <tr><th>Name</th><th>Value</th></tr>
          </thead>
          <tbody>
            <tr><td>Lorem</td><td>Ipsum</td></tr>
            <tr><td>Dolor</td><td>Sit</td></tr>
            <tr><td>Amet</td><td>Consectetur</td></tr>
          </tbody>
        </table>
        <p>Morbi non urna nec sapien dictum dictum.</p>
      </section>
    </article>
    <a href="../index.html">&lt;-- Back</a>
  </div>
</body>
